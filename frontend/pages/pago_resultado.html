<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado de pago - EduQuak</title>
  <link rel="stylesheet" href="/css/nav-global.css">
  <link rel="stylesheet" href="/css/compact-ui.css">
  <link rel="stylesheet" href="/css/ui-feedback.css">
  <link rel="stylesheet" href="/css/pago_resultado.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo-wrap">
      <div class="logo-mark">
        <img src="/img/logo-eduquak.png" alt="Logo EduQuak" onerror="this.style.display='none'">
      </div>
      <div class="logo-text">
        <span class="logo-title">EduQuak</span>
        <span class="logo-subtitle">Pago de asesoría</span>
      </div>
    </div>
    <div class="nav-actions">
      <a href="/pages/mis_asesorias.html" class="nav-link">Volver a mis asesorías</a>
    </div>
  </nav>

  <main class="pago-container">
    <section id="estadoPagoCard" class="pago-resultado-card procesando">
      <span class="pago-badge">Mercado Pago</span>
      <h1 id="tituloPago">Validando tu pago</h1>
      <p id="mensajePago">Estamos confirmando el resultado con EduQuak.</p>
      <div id="detallePago" class="detalle-pago"></div>
      <div class="acciones-pago">
        <a href="/pages/mis_asesorias.html" class="btn primary">Ir a mis asesorías</a>
        <a href="/pages/grupales.html" class="btn outline">Ver grupales</a>
      </div>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/pago_resultado.js"></script>
</body>
</html>
