<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar asesores - EduQuak</title>
  <link rel="stylesheet" href="/css/alumno_nav.css">
  <link rel="stylesheet" href="/css/buscar_asesores.css">
  <link rel="stylesheet" href="/css/nav-global.css">
  <link rel="stylesheet" href="/css/compact-ui.css">
  <link rel="stylesheet" href="/css/ui-feedback.css">
  <link rel="stylesheet" href="/css/ui-loading.css">
  <link rel="stylesheet" href="/css/chatbot-plataforma.css">
</head>
<body>
  <nav class="navbar">
  <div class="logo-wrap">
    <div class="logo-mark">
        <img src="/img/logo-eduquak.png" alt="Logo EduQuak" onerror="this.style.display='none'">
      </div>
    <div class="logo-text">
      <span class="logo-title">EduQuak</span>
      <span class="logo-subtitle">Alumno</span>
    </div>
  </div>

  <div class="nav-actions">
    <a href="/pages/alumno.html" class="nav-link">Volver al panel</a>
  </div>
</nav>

  <main class="container">
    <section class="hero-card">
      <span class="badge">Asesores disponibles</span>
      <h1>Encuentra el apoyo que necesitas</h1>
      <p class="subtitle">
        Explora asesores verificados, revisa su especialidad y solicita una asesoría.
      </p>
    </section>

    <section class="toolbar">
      <div class="search-box">
        <label for="busquedaAsesor">Buscar asesor</label>
        <input type="text" id="busquedaAsesor" placeholder="Nombre, especialidad o materia">
      </div>
    </section>
<section id="topAsesoresAlumno" class="top-asesores-section top-collapsed hidden">
      <button id="btnToggleTopAsesoresAlumno" class="top-toggle" type="button">
        <span>
          <strong>Top asesores mejor calificados</strong>
          <small>Ver asesores destacados por reseñas</small>
        </span>
        <b id="topToggleTextAlumno">Mostrar</b>
      </button>

      <div id="topContentAlumno" class="top-content hidden">
        <div id="listaTopAsesoresAlumno" class="top-asesores-modern-list"></div>
      </div>
    </section>

    <section id="listaAsesores" class="asesores-grid"></section>

    <div id="mensajeSolicitar" class="message-box hidden"></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/ui-feedback.js"></script>
  <script src="/js/ui-loading.js"></script>
  <script src="/js/chatbot-plataforma.js"></script>

  <script src="/js/buscar_asesores.js"></script>
  <script src="/js/config.js"></script>
</body>
</html>
