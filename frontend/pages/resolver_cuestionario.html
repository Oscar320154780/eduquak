<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolver cuestionario - EduQuak</title>

  <link rel="stylesheet" href="/css/resolver_cuestionario.css">
  <link rel="stylesheet" href="/css/nav-global.css">
  <link rel="stylesheet" href="/css/compact-ui.css">
  <link rel="stylesheet" href="/css/ui-feedback.css">
  <link rel="stylesheet" href="/css/ui-loading.css">
  <link rel="stylesheet" href="/css/chatbot-plataforma.css">
  <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>

<body>

  <nav class="navbar">

    <div class="logo-wrap">
      <div class="logo-mark">
        <img src="/img/logo-eduquak.png" alt="Logo EduQuak" onerror="this.style.display='none'">
      </div>

      <div class="logo-text">
        <span class="logo-title">EduQuak</span>
        <span class="logo-subtitle">Cuestionario</span>
      </div>
    </div>

    <div class="nav-actions">
      <a
        href="/pages/cuestionarios.html"
        class="nav-link"
      >Volver a cuestionarios</a>
    </div>

  </nav>

  <main class="container">

    <section class="hero-card">

      <span class="badge">
        Resolver cuestionario
      </span>

      <h1 id="tituloCuestionario">
        Cargando cuestionario...
      </h1>

      <p class="subtitle">
        Lee cuidadosamente cada pregunta y selecciona la opción correcta.
      </p>

    </section>

    <section
      id="preguntasContainer"
      class="preguntas-list"
    ></section>

    <section class="actions-panel">

      <button
        id="btnEnviar"
        class="btn primary"
      >
        Enviar respuestas
      </button>

    </section>

    <section
      id="resultadoBox"
      class="resultado-box hidden"
    >

      <h2>
        Resultado
      </h2>

      <div class="resultado-grid">

        <div class="resultado-card">

          <span class="label">
            Correctas
          </span>

          <p id="resultadoCorrectas">
            -
          </p>

        </div>

        <div class="resultado-card">

          <span class="label">
            Total
          </span>

          <p id="resultadoTotal">
            -
          </p>

        </div>

        <div class="resultado-card full">

          <span class="label">
            Puntaje
          </span>

          <p id="resultadoPuntaje">
            -
          </p>

        </div>

      </div>

      <div class="grafica-container">

        <canvas id="graficaResultados"></canvas>

      </div>

    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/js/ui-feedback.js"></script>
  <script src="/js/ui-loading.js"></script>
  <script src="/js/chatbot-plataforma.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="/js/resolver_cuestionario.js"></script>
  <script src="/js/config.js"></script>
</body>
</html>
